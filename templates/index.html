<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Đoán Số Bí Mật</title>

<link rel="stylesheet" href="/static/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<h1 class="title">Đoán Số Bí Mật 🔐</h1>

<div class="player-box">

<input id="playerName" placeholder="Tên của bạn">

<button onclick="startGame()">Start Game</button>

</div>

<div class="music-box">

<select id="musicSelect" onchange="changeMusic()">

<option value="0">Song 1</option>
<option value="1">Song 2</option>
<option value="2">Song 3</option>

</select>

<button onclick="toggleMusic()">Play / Pause</button>

<label>Volume</label>

<input type="range" id="volumeSlider" min="0" max="1" step="0.1"
onchange="changeVolume()">

</div>

<div id="board"></div>

<div class="guess-box">

<input id="guessInput" maxlength="6" placeholder="Nhập 6 số">

<button onclick="submitGuess()">Đoán</button>

</div>

<div class="legend">

<span class="green"></span> Đúng vị trí

<span class="yellow"></span> Có nhưng sai vị trí

<span class="gray"></span> Không tồn tại

</div>

<h2>Leaderboard</h2>

<div id="leaderboard"></div>

</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/game.js"></script>

</body>
</html>
